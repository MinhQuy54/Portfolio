services:
  rag_api:
    build:
      context: ./chatbot
      dockerfile: Dockerfile
    env_file:
      - ./chatbot/.env
    depends_on:
      - qdrant_db
    volumes:
      - ./chatbot/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - portfolio_net
  qdrant_db:
    image: qdrant/qdrant:latest

    ports:
      - "6333:6333" # ports REST API
      - "6334:6334" # ports gRPC 
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    networks:
      - portfolio_net

networks:
  portfolio_net:
    driver: bridge

volumes:
  qdrant_storage:
